<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Agent Chat</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;600&family=Sora:wght@300;400;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0d0f14;
    --surface: #13161e;
    --surface2: #1a1e2a;
    --border: #252a38;
    --accent: #4fffb0;
    --accent2: #00c8ff;
    --accent-dim: rgba(79,255,176,0.12);
    --text: #e2e8f0;
    --text-muted: #64748b;
    --user-bubble: #1a2744;
    --agent-bubble: #131a2b;
    --error: #ff4f6b;
    --font-mono: 'JetBrains Mono', monospace;
    --font-ui: 'Sora', sans-serif;
    --radius: 14px;
    --radius-sm: 8px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--font-ui);
    height: 100vh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  /* ── HEADER — one line ── */
  header {
    padding: 0 14px;
    height: 46px;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 8px;
    flex-shrink: 0;
    position: relative;
    z-index: 1;
  }

  .logo-ring {
    width: 26px; height: 26px;
    border-radius: 50%;
    border: 1.5px solid var(--accent);
    display: flex; align-items: center; justify-content: center;
    box-shadow: 0 0 8px rgba(79,255,176,0.25);
    flex-shrink: 0;
  }
  .logo-ring svg { width: 13px; height: 13px; }

  .header-title {
    font-size: 13px;
    font-weight: 600;
    color: var(--text);
    white-space: nowrap;
    flex-shrink: 0;
  }

  #webhook-url {
    flex: 1;
    background: var(--bg);
    border: 1px solid var(--border);
    color: var(--text-muted);
    font-family: var(--font-mono);
    font-size: 11px;
    padding: 4px 9px;
    border-radius: var(--radius-sm);
    outline: none;
    transition: border-color 0.2s, color 0.2s;
    min-width: 0;
  }
  #webhook-url:focus { border-color: var(--accent); color: var(--text); }

  #session-id-box {
    background: transparent;
    border: 1px solid var(--border);
    color: var(--accent);
    font-family: var(--font-mono);
    font-size: 10px;
    padding: 4px 9px;
    border-radius: var(--radius-sm);
    white-space: nowrap;
    cursor: pointer;
    flex-shrink: 0;
  }

  .cfg-btn {
    background: var(--accent-dim);
    border: 1px solid var(--accent);
    color: var(--accent);
    font-family: var(--font-mono);
    font-size: 10px;
    padding: 4px 10px;
    border-radius: var(--radius-sm);
    cursor: pointer;
    transition: background 0.2s;
    white-space: nowrap;
    flex-shrink: 0;
  }
  .cfg-btn:hover { background: rgba(79,255,176,0.22); }

  .status-dot {
    width: 7px; height: 7px;
    border-radius: 50%;
    background: var(--text-muted);
    flex-shrink: 0;
    transition: background 0.4s, box-shadow 0.4s;
  }
  .status-dot.online   { background: var(--accent);  box-shadow: 0 0 6px var(--accent); }
  .status-dot.thinking { background: var(--accent2); box-shadow: 0 0 6px var(--accent2); animation: pulse 1s infinite; }

  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.3} }

  /* ── MESSAGES ── */
  #messages {
    flex: 1;
    overflow-y: auto;
    padding: 20px;
    display: flex;
    flex-direction: column;
    gap: 14px;
    scroll-behavior: smooth;
    position: relative; z-index: 1;
  }
  #messages::-webkit-scrollbar { width: 4px; }
  #messages::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

  .msg-row { display:flex; gap:10px; animation:fadeIn 0.2s ease; }
  @keyframes fadeIn { from{opacity:0;transform:translateY(5px)} to{opacity:1;transform:translateY(0)} }
  .msg-row.user { flex-direction: row-reverse; }

  .avatar {
    width: 30px; height: 30px;
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 13px; flex-shrink: 0; margin-top: 2px;
  }
  .avatar.agent { background:var(--surface2); border:1px solid var(--border); }
  .avatar.user  { background:#1a2744; border:1px solid #253a6e; }

  .bubble-wrap { display:flex; flex-direction:column; max-width:74%; }
  .msg-row.user .bubble-wrap { align-items:flex-end; }

  .bubble {
    padding: 10px 14px;
    border-radius: var(--radius);
    font-size: 14px;
    line-height: 1.72;
    word-break: break-word;
  }
  .msg-row.agent .bubble {
    background: var(--agent-bubble);
    border: 1px solid var(--border);
    border-radius: 4px var(--radius) var(--radius) var(--radius);
  }
  .msg-row.user .bubble {
    background: var(--user-bubble);
    border: 1px solid #253a6e;
    border-radius: var(--radius) 4px var(--radius) var(--radius);
  }

  .bubble-meta {
    font-size: 10px; color:var(--text-muted);
    font-family:var(--font-mono); margin-top:3px; padding:0 2px;
  }

  /* ── Telegram-like HTML rendering ── */
  .bubble b, .bubble strong { font-weight: 600; }
  .bubble i, .bubble em    { font-style: italic; color: #b8c8e8; }
  .bubble u                { text-decoration: underline; text-decoration-color: var(--accent); }
  .bubble code {
    background: rgba(255,255,255,0.07);
    font-family: var(--font-mono);
    font-size: 12.5px;
    padding: 1px 5px;
    border-radius: 4px;
    color: var(--accent2);
  }
  .bubble pre {
    background: rgba(0,0,0,0.35);
    font-family: var(--font-mono);
    font-size: 12px;
    padding: 10px 12px;
    border-radius: var(--radius-sm);
    border: 1px solid var(--border);
    overflow-x: auto;
    margin: 6px 0;
    color: var(--accent2);
    white-space: pre-wrap;
    line-height: 1.5;
  }
  /* plain text: keep newlines */
  .bubble .plain { white-space: pre-wrap; }

  /* typing */
  .typing-bubble { display:flex; align-items:center; gap:5px; padding:14px 16px; }
  .dot { width:7px; height:7px; border-radius:50%; background:var(--accent); animation:blink 1.2s infinite; }
  .dot:nth-child(2){ animation-delay:.2s; background:var(--accent2); }
  .dot:nth-child(3){ animation-delay:.4s; }
  @keyframes blink{ 0%,80%,100%{opacity:.2;transform:scale(.8)} 40%{opacity:1;transform:scale(1)} }

  .bubble.error { border-color:var(--error); color:var(--error); font-family:var(--font-mono); font-size:12px; }

  .welcome { text-align:center; padding:40px 20px; opacity:.45; }
  .welcome-icon { font-size:38px; margin-bottom:12px; }
  .welcome h2 { font-size:16px; font-weight:600; margin-bottom:4px; }
  .welcome p { font-size:12px; color:var(--text-muted); font-family:var(--font-mono); }

  /* ── INPUT ── */
  #input-area {
    padding: 10px 14px 14px;
    background: var(--surface);
    border-top: 1px solid var(--border);
    display: flex; gap: 10px; align-items: flex-end;
    flex-shrink: 0; position: relative; z-index: 1;
  }
  #msg-input {
    flex: 1;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 10px 14px;
    color: var(--text);
    font-family: var(--font-ui);
    font-size: 14px;
    resize: none; outline: none;
    min-height: 44px; max-height: 140px;
    transition: border-color .2s, box-shadow .2s;
    line-height: 1.5;
  }
  #msg-input:focus { border-color:var(--accent); box-shadow:0 0 0 3px rgba(79,255,176,0.07); }
  #msg-input::placeholder { color:var(--text-muted); }

  #send-btn {
    width:44px; height:44px; border-radius:50%;
    background:var(--accent); border:none; cursor:pointer;
    display:flex; align-items:center; justify-content:center; flex-shrink:0;
    transition:transform .15s, box-shadow .2s, opacity .2s;
    box-shadow:0 0 14px rgba(79,255,176,0.28);
  }
  #send-btn:hover { transform:scale(1.08); box-shadow:0 0 22px rgba(79,255,176,0.48); }
  #send-btn:active { transform:scale(0.95); }
  #send-btn:disabled { opacity:.35; cursor:not-allowed; transform:none; }
  #send-btn svg { width:18px; height:18px; }

  body::before {
    content:''; position:fixed; inset:0;
    background-image:linear-gradient(rgba(255,255,255,.012) 1px,transparent 1px),
                     linear-gradient(90deg,rgba(255,255,255,.012) 1px,transparent 1px);
    background-size:40px 40px; pointer-events:none; z-index:0;
  }

  #toast {
    position:fixed; bottom:74px; left:50%;
    transform:translateX(-50%) translateY(14px);
    background:var(--surface2); border:1px solid var(--accent);
    color:var(--accent); font-family:var(--font-mono); font-size:11px;
    padding:6px 14px; border-radius:20px;
    opacity:0; transition:opacity .3s,transform .3s; pointer-events:none; z-index:100;
  }
  #toast.show { opacity:1; transform:translateX(-50%) translateY(0); }
</style>
</head>
<body>

<header>
  <div class="logo-ring">
    <svg viewBox="0 0 24 24" fill="none" stroke="#4fffb0" stroke-width="2">
      <path d="M12 2L2 7l10 5 10-5-10-5z"/>
      <path d="M2 17l10 5 10-5"/>
      <path d="M2 12l10 5 10-5"/>
    </svg>
  </div>
  <span class="header-title">AI Agent</span>
  <input id="webhook-url" type="text" placeholder="https://your-n8n.com/webhook/…" />
  <div id="session-id-box">🔑 <span id="sid-display"></span></div>
  <button class="cfg-btn" onclick="resetSession()">New Session</button>
  <button class="cfg-btn" onclick="clearChat()">Clear</button>
  <div class="status-dot" id="status-dot"></div>
</header>

<div id="messages">
  <div class="welcome" id="welcome-msg">
    <div class="welcome-icon">🤖</div>
    <h2>AI Agent Ready</h2>
    <p>Вставь Webhook URL и начинай</p>
  </div>
</div>

<div id="input-area">
  <textarea id="msg-input" rows="1" placeholder="Сообщение… (Enter — отправить, Shift+Enter — перенос)"></textarea>
  <button id="send-btn" onclick="sendMessage()">
    <svg viewBox="0 0 24 24" fill="none" stroke="#0d0f14" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
      <line x1="22" y1="2" x2="11" y2="13"/>
      <polygon points="22 2 15 22 11 13 2 9 22 2"/>
    </svg>
  </button>
</div>

<div id="toast"></div>

<script>
// ── SESSION ──
let sessionId = localStorage.getItem('n8n_session') || generateSessionId();
let webhookUrl = localStorage.getItem('n8n_webhook') || '';
let isThinking = false;

function generateSessionId() {
  const id = 'web_' + Date.now() + '_' + Math.random().toString(36).slice(2,8);
  localStorage.setItem('n8n_session', id);
  return id;
}
function resetSession() { sessionId = generateSessionId(); updateSessionDisplay(); toast('Новая сессия'); }
function updateSessionDisplay() {
  document.getElementById('sid-display').textContent = sessionId.slice(0,14) + '…';
}

const urlInput = document.getElementById('webhook-url');
urlInput.value = webhookUrl;
urlInput.addEventListener('input', () => {
  webhookUrl = urlInput.value.trim();
  localStorage.setItem('n8n_webhook', webhookUrl);
  updateStatus();
});

function updateStatus() {
  document.getElementById('status-dot').className = 'status-dot' + (webhookUrl ? ' online' : '');
}
updateSessionDisplay();
updateStatus();

// ── RENDER: Telegram HTML tags + plain newlines ──
const ALLOWED_TAGS = /^\/?(b|i|u|strong|em|code|pre)$/i;

function renderAgentText(raw) {
  if (!raw) return '';
  // Check if contains any HTML tags
  if (!/<[a-z]/i.test(raw)) {
    // Plain text — preserve newlines
    const escaped = raw.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
    return `<span class="plain">${escaped}</span>`;
  }
  // Has HTML — strip only disallowed tags, keep allowed ones
  const clean = raw.replace(/<\/?([a-zA-Z][a-zA-Z0-9]*)[^>]*>/g, (match, tag) => {
    return ALLOWED_TAGS.test(tag) ? match : '';
  });
  // Replace literal \n with <br> (outside <pre> blocks is fine)
  return clean.replace(/\n/g, '<br>');
}

// ── MESSAGES ──
const messagesEl = document.getElementById('messages');

function appendMessage(role, text) {
  document.getElementById('welcome-msg')?.remove();

  const row = document.createElement('div');
  row.className = `msg-row ${role}`;

  const avatar = document.createElement('div');
  avatar.className = `avatar ${role}`;
  avatar.textContent = role === 'user' ? '👤' : '🤖';

  const wrap = document.createElement('div');
  wrap.className = 'bubble-wrap';

  const bubble = document.createElement('div');
  bubble.className = 'bubble';
  if (role === 'agent') bubble.innerHTML = renderAgentText(text);
  else bubble.textContent = text;

  const meta = document.createElement('div');
  meta.className = 'bubble-meta';
  meta.textContent = new Date().toLocaleTimeString([], {hour:'2-digit',minute:'2-digit'});

  wrap.appendChild(bubble);
  wrap.appendChild(meta);
  row.appendChild(avatar);
  row.appendChild(wrap);
  messagesEl.appendChild(row);
  messagesEl.scrollTop = messagesEl.scrollHeight;
}

function appendError(msg) {
  document.getElementById('welcome-msg')?.remove();
  const row = document.createElement('div');
  row.className = 'msg-row agent';
  const av = document.createElement('div');
  av.className = 'avatar agent'; av.textContent = '⚠️';
  const b = document.createElement('div');
  b.className = 'bubble error'; b.textContent = msg;
  row.appendChild(av); row.appendChild(b);
  messagesEl.appendChild(row);
  messagesEl.scrollTop = messagesEl.scrollHeight;
}

function showTyping() {
  const row = document.createElement('div');
  row.className = 'msg-row agent'; row.id = 'typing-indicator';
  const av = document.createElement('div');
  av.className = 'avatar agent'; av.textContent = '🤖';
  const b = document.createElement('div');
  b.className = 'bubble typing-bubble';
  b.innerHTML = '<div class="dot"></div><div class="dot"></div><div class="dot"></div>';
  row.appendChild(av); row.appendChild(b);
  messagesEl.appendChild(row);
  messagesEl.scrollTop = messagesEl.scrollHeight;
}
function hideTyping() { document.getElementById('typing-indicator')?.remove(); }

// ── SEND ──
async function sendMessage() {
  if (isThinking) return;
  const input = document.getElementById('msg-input');
  const text = input.value.trim();
  if (!text) return;
  if (!webhookUrl) { toast('⚠️ Укажи Webhook URL'); urlInput.focus(); return; }

  input.value = ''; resizeTextarea(input);
  appendMessage('user', text);

  isThinking = true;
  document.getElementById('send-btn').disabled = true;
  document.getElementById('status-dot').className = 'status-dot thinking';
  showTyping();

  try {
    const res = await fetch(webhookUrl, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ message: text, sessionId })
    });
    hideTyping();

    if (!res.ok) { appendError(`HTTP ${res.status}: ${res.statusText}`); return; }

    let data;
    try {
      const ct = res.headers.get('content-type') || '';
      data = ct.includes('application/json') ? await res.json() : JSON.parse(await res.text());
    } catch { appendError('Не удалось разобрать ответ'); return; }

    if (Array.isArray(data)) data = data[0];

    // Single source of truth: output_clean
    const reply = data?.output_clean || data?.output || data?.text || data?.message || '';
    if (reply) appendMessage('agent', reply);
    else appendError('Пустой ответ от агента');

  } catch(err) {
    hideTyping();
    appendError('Ошибка сети: ' + err.message);
  } finally {
    isThinking = false;
    document.getElementById('send-btn').disabled = false;
    updateStatus();
  }
}

function clearChat() {
  messagesEl.innerHTML = '';
  const w = document.createElement('div');
  w.className = 'welcome'; w.id = 'welcome-msg';
  w.innerHTML = '<div class="welcome-icon">🤖</div><h2>Чат очищен</h2><p>Начни новый разговор</p>';
  messagesEl.appendChild(w);
}

const inputEl = document.getElementById('msg-input');
inputEl.addEventListener('keydown', e => { if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();sendMessage();} });
inputEl.addEventListener('input', () => resizeTextarea(inputEl));
function resizeTextarea(el) { el.style.height='auto'; el.style.height=Math.min(el.scrollHeight,140)+'px'; }

function toast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'), 2600);
}
</script>
</body>
</html>
